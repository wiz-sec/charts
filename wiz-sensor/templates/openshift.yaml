{{- if .Values.openshift -}}
apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: {{ include "wiz-sensor.fullname" . }}-scc
  labels: {{- include "wiz-sensor.labels" . | nindent 4 }}
allowHostDirVolumePlugin: true
allowPrivilegedContainer: true
allowHostIPC: true
allowHostNetwork: true
allowHostPID: true
allowHostPorts: true
allowedCapabilities:
  - SYS_ADMIN # for kernels <5.8 (CAP_BPF and CAP_PERFMON)
  - SYS_CHROOT # setns (file hash)
  - SYS_RESOURCE # eBPF
  - SYS_RAWIO # file hashing
  - DAC_OVERRIDE # file hashing
  - DAC_READ_SEARCH # file hashing
  - NET_ADMIN # network events
  - NET_RAW # network events
  - IPC_LOCK # eBPF
  - FOWNER # file hashing
  - SYS_PTRACE # eBPF
  - KILL # forensics
  - SYSLOG # syslog
  - CHOWN # Access filesystem with overlayFS.
  - SETPCAP # Drop capabilities when not needed.
  - LEASE # for safe mmap
requiredDropCapabilities: null
fsGroup:
  type: RunAsAny
groups: []
priority: 0
readOnlyRootFilesystem: true
runAsUser:
  type: RunAsAny
seLinuxContext:
  type: RunAsAny
supplementalGroups:
  type: RunAsAny
seccompProfiles:
  - "*"
users: []
# Keep alphabetically sorted
volumes:
  - configMap
  - downwardAPI
  - emptyDir
  - hostPath
  - persistentVolumeClaim
  - projected
  - secret
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "wiz-sensor.fullname" . }}-scc
  labels: {{- include "wiz-sensor.labels" . | nindent 4 }}
rules:
- apiGroups:
  - security.openshift.io
  resourceNames:
  - {{ include "wiz-sensor.fullname" . }}-scc
  resources:
  - securitycontextconstraints
  verbs:
  - use
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "wiz-sensor.fullname" . }}-scc
  labels: {{- include "wiz-sensor.labels" . | nindent 4 }}
subjects:
- kind: ServiceAccount
  name: {{ include "wiz-sensor.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "wiz-sensor.fullname" . }}-scc
  apiGroup: rbac.authorization.k8s.io
{{- end }}
