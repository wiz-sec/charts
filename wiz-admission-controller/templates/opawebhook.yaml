  labels:
    {{- include "wiz-admission-controller.labels" . | nindent 4 }}
  annotations:
  {{- if .Values.webhook.useHelmHooks }}
    "helm.sh/hook": "post-install, post-upgrade"
    "helm.sh/hook-delete-policy": "before-hook-creation"
  {{- end }}
  {{- if $useCertManagerCerts }}
