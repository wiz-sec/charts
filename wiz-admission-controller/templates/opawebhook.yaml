{{- if and .Values.wizManager.enabled .Values.wizManager.selfLoop.enabled }}
{{ include "wiz-admission-controller.webhookEntry" (dict
  "root" .
  "webhookName" (include "wiz-admission-controller.selfLoop.name.imageIntegrity" .)
  "serviceName" (include "wiz-admission-controller-enforcer.name" .)
  "path" "/self-loop"
  "tlsCrt" $tlsCrt
  "useCertManagerCerts" $useCertManagerCerts
  "rules" (include "wiz-admission-controller.selfLoop.rules" . | fromYamlArray)
  "namespaceSelector" (include "wiz-admission-controller.selfLoop.namespaceSelector" . | fromYaml)
  "objectSelector" (include "wiz-admission-controller.selfLoop.objectSelector" (list . (include "wiz-admission-controller.selfLoop.name.imageIntegrity" .)) | fromYaml)
  "timeoutSeconds" .Values.imageIntegrityWebhook.timeoutSeconds
  "sideEffects" "None"
  "failurePolicy" "Fail"
) }}
{{- end }}
{{- end }}
