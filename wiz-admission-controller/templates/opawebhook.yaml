{{- $useCertManagerCerts := (or .Values.webhook.injectCaFrom .Values.webhook.createSelfSignedCert) -}}
{{- $tlsCrt := .Values.tlsCertificate.tlsCertificate -}}
{{- $tlsKey := .Values.tlsCertificate.tlsKey -}}
{{- if .Values.tlsCertificate.create -}}
{{- $existingSecret := dict -}}
{{- if .Values.tlsCertificate.reuseExisting -}}
{{- $existingSecret = include "wiz-admission-controller.lookupTlsSecret" . | fromJson -}}
{{- end -}}
{{- if and $existingSecret $existingSecret.data (index $existingSecret.data "tls.crt") -}}
{{- $tlsCrt = index $existingSecret.data "tls.crt" -}}
{{- $tlsKey = index $existingSecret.data "tls.key" -}}
{{- else -}}
{{- $altNames := list
  ( printf "%s.%s" (include "wiz-admission-controller-enforcer.name" .) .Release.Namespace )
  ( printf "%s.%s.svc" (include "wiz-admission-controller-enforcer.name" .) .Release.Namespace )
  ( printf "%s.%s" ( include "wiz-kubernetes-audit-log-collector.name" .) .Release.Namespace )
  ( printf "%s.%s.svc" ( include "wiz-kubernetes-audit-log-collector.name" .) .Release.Namespace ) -}}
{{- if .Values.sensorInject.enabled }}
{{- $altNames = append $altNames ( printf "%s.%s" (include "wiz-sensor-inject.name" .) .Release.Namespace ) }}
{{- $altNames = append $altNames ( printf "%s.%s.svc" (include "wiz-sensor-inject.name" .) .Release.Namespace ) }}
{{- end }}
{{- if .Values.debugWebhook.enabled }}
{{- $altNames = append $altNames ( printf "%s.%s" (include "wiz-debug-webhook.name" .) .Release.Namespace ) }}
{{- $altNames = append $altNames ( printf "%s.%s.svc" (include "wiz-debug-webhook.name" .) .Release.Namespace ) }}
{{- end }}
{{- $ca := genCA "wiz-admission-controller-ca" 3650 -}}
{{- $cert := genSignedCert ( include "wiz-admission-controller.fullname" . ) nil $altNames 3650 $ca -}}
{{- $tlsCrt = $cert.Cert | b64enc -}}
{{- $tlsKey = $cert.Key | b64enc -}}
{{- end -}}
{{- end -}}
{{ if .Values.opaWebhook.enabled -}}
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ printf "%s-%s" (include "wiz-admission-controller-enforcer.name" . ) "misconfigurations" }}
  labels:
    {{- include "wiz-admission-controller.labels" . | nindent 4 }}
  annotations:
  {{- if .Values.webhook.useHelmHooks }}
    "helm.sh/hook": "post-install, post-upgrade"
    "helm.sh/hook-delete-policy": "before-hook-creation"
  {{- end }}
  {{- if $useCertManagerCerts }}
    "cert-manager.io/inject-ca-from": {{ include "wiz-admission-controller.certManagerInject" . }}
  {{- end }}
webhooks:
{{ include "wiz-admission-controller.webhookEntry" (dict
  "root" .
  "webhookName" "misconfigurationsadmissionvalidator.wiz.io"
  "serviceName" (include "wiz-admission-controller-enforcer.name" .)
  "path" "/opa-validator"
  "tlsCrt" $tlsCrt
  "useCertManagerCerts" $useCertManagerCerts
  "rules" .Values.opaWebhook.rules
  "additionalRules" .Values.opaWebhook.additionalRules
  "namespaceSelector" .Values.opaWebhook.namespaceSelector
  "timeoutSeconds" .Values.opaWebhook.timeoutSeconds
  "sideEffects" .Values.opaWebhook.sideEffects
) }}
{{- if and .Values.wizManager.enabled .Values.wizManager.selfLoop.enabled }}
{{ include "wiz-admission-controller.webhookEntry" (dict
  "root" .
  "webhookName" (include "wiz-admission-controller.selfLoop.name.misconfiguration" .)
  "serviceName" (include "wiz-admission-controller-enforcer.name" .)
  "path" "/self-loop"
  "tlsCrt" $tlsCrt
  "useCertManagerCerts" $useCertManagerCerts
  "rules" (include "wiz-admission-controller.selfLoop.rules" . | fromYamlArray)
  "namespaceSelector" (include "wiz-admission-controller.selfLoop.namespaceSelector" . | fromYaml)
  "objectSelector" (include "wiz-admission-controller.selfLoop.objectSelector" (list . (include "wiz-admission-controller.selfLoop.name.misconfiguration" .)) | fromYaml)
  "timeoutSeconds" .Values.opaWebhook.timeoutSeconds
  "sideEffects" "None"
  "failurePolicy" "Fail"
) }}
{{- end }}
{{- end }}
