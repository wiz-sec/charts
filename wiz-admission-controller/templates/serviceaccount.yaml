{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "wiz-admission-controller.serviceAccountName" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "wiz-admission-controller.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
---
{{ if .Values.serviceAccount.createRbac }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ printf "%s-namespace-reader" (include "wiz-admission-controller.serviceAccountName" .) }}
  labels:
    {{- include "wiz-admission-controller.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list"]
{{- if .Values.sensorInject.enabled }}
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames:
    - {{ include "wiz-admission-controller.sensorApiKeySecretName" . | quote }}
    - {{ .Values.sensorInject.registrySecret.name }}
  verbs: ["get"]
{{- end }}
{{- if .Values.crdCache.enabled }}
- apiGroups: ["wiz.io"]
  resources: ["wizadmissioncontrollercaches"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["wiz.io"]
  resources: ["wizadmissioncontrollercaches/status"]
  verbs: ["get", "update", "patch"]
{{- end }}
{{- if or (eq (include "wiz-admission-controller.scrapeAPIServerMetricsEnabled" . | trim | lower) "true") .Values.crdCache.enabled }}
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  resourceNames:
{{- $enabledTypes := include "wiz-admission-controller.enabledRunnerTypes" . | fromJsonArray }}
{{- range $runnerType := $enabledTypes }}
    - {{ include "wiz-admission-controller.leaderLockId" $runnerType }}
{{- end }}
    - {{ include "wiz-admission-controller.globalLeaderLeaseName" . }}
  verbs: ["get", "update", "patch"]
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["create"]
{{- end }}
{{- if eq (include "wiz-admission-controller.scrapeAPIServerMetricsEnabled" . | trim | lower) "true" }}
- nonResourceURLs: ["/metrics"]
  verbs: ["get"]
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ printf "%s-namespace" (include "wiz-admission-controller.serviceAccountName" .) }}
  labels:
    {{- include "wiz-admission-controller.labels" . | nindent 4 }}
subjects:
- kind: ServiceAccount
  name: {{ include "wiz-admission-controller.serviceAccountName" . }}
  namespace: {{ .Release.Namespace | quote }}
roleRef:
  kind: ClusterRole
  name: {{ printf "%s-namespace-reader" (include "wiz-admission-controller.serviceAccountName" .) }}
  apiGroup: rbac.authorization.k8s.io
{{ end }}

{{- if eq (include "wiz-admission-controller.scrapeAPIServerMetricsEnabled" . | trim | lower) "true" }}
{{- $useClusterRole := .Values.scrapeAPIServerMetrics.rbac.useClusterRole }}
{{- $roleNamespace := .Values.scrapeAPIServerMetrics.rbac.namespace }}
---
# ClusterRole by default so the chart does not create namespaced resources in
# "default" (where the kubernetes Service lives), which is commonly blocked by
# ValidatingAdmissionPolicies on hardened clusters. Same shape kube-state-metrics
# uses for reading EndpointSlices.
apiVersion: rbac.authorization.k8s.io/v1
kind: {{ if $useClusterRole }}ClusterRole{{ else }}Role{{ end }}
metadata:
  labels:
    {{- include "wiz-admission-controller.labels" . | nindent 4 }}
  name: {{ printf "%s-apiserver-endpoints" (include "wiz-admission-controller.serviceAccountName" .) }}
  {{- if not $useClusterRole }}
  namespace: {{ $roleNamespace | quote }}
  {{- end }}
rules:
- apiGroups: ["discovery.k8s.io"]
  resources:
  - endpointslices
  verbs: ["list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: {{ if $useClusterRole }}ClusterRoleBinding{{ else }}RoleBinding{{ end }}
metadata:
  labels:
    {{- include "wiz-admission-controller.labels" . | nindent 4 }}
  name: {{ printf "%s-apiserver-endpoints" (include "wiz-admission-controller.serviceAccountName" .) }}
  {{- if not $useClusterRole }}
  namespace: {{ $roleNamespace | quote }}
  {{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: {{ if $useClusterRole }}ClusterRole{{ else }}Role{{ end }}
  name: {{ printf "%s-apiserver-endpoints" (include "wiz-admission-controller.serviceAccountName" .) }}
subjects:
- kind: ServiceAccount
  name: {{ include "wiz-admission-controller.serviceAccountName" . }}
  namespace: {{ .Release.Namespace | quote }}
{{ end }}

{{ if and .Values.imageIntegrityWebhook.enabled .Values.imageRegistryClient.pullSecrets .Values.imageRegistryClient.createRole }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ printf "%s-pull-secrets-reader" (include "wiz-admission-controller.serviceAccountName" .) }}
  namespace: {{ .Values.imageRegistryClient.secretsNamespace | quote }}
  labels:
    {{- include "wiz-admission-controller.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: {{ .Values.imageRegistryClient.pullSecrets | toJson }}
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ printf "%s-pull-secrets-reader" (include "wiz-admission-controller.serviceAccountName" .) }}
  namespace: {{ .Values.imageRegistryClient.secretsNamespace | quote }}
  labels:
    {{- include "wiz-admission-controller.labels" . | nindent 4 }}
subjects:
- kind: ServiceAccount
  name: {{ include "wiz-admission-controller.serviceAccountName" . }}
  namespace: {{ .Release.Namespace | quote }}
roleRef:
  kind: Role
  name: {{ printf "%s-pull-secrets-reader" (include "wiz-admission-controller.serviceAccountName" .) }}
  apiGroup: rbac.authorization.k8s.io
{{ end }}


{{- if .Values.wizManager.enabled -}}
{{- if .Values.wizManager.serviceAccount.create -}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "wiz-admission-controller.manager.serviceAccountName" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "wiz-admission-controller.labels" . | nindent 4 }}
  {{- with .Values.wizManager.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}

{{ if .Values.wizManager.serviceAccount.createRbac }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ printf "%s-pods-and-deployments-manager" (include "wiz-admission-controller.manager.serviceAccountName" .) }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "wiz-admission-controller.labels" . | nindent 4 }}
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: {{ include "wiz-admission-controller.autoUpdate.deployments" . }}
    verbs: ["get", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ printf "%s-pods-and-deployments" (include "wiz-admission-controller.manager.serviceAccountName" .) }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "wiz-admission-controller.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "wiz-admission-controller.manager.serviceAccountName" . }}
    namespace: {{ .Release.Namespace | quote }}
roleRef:
  kind: Role
  name: {{ printf "%s-pods-and-deployments-manager" (include "wiz-admission-controller.manager.serviceAccountName" .) }}
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ printf "%s-event-creator" (include "wiz-admission-controller.manager.serviceAccountName" .) }}
  labels:
    {{- include "wiz-admission-controller.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ printf "%s-event-creator" (include "wiz-admission-controller.manager.serviceAccountName" .) }}
  labels:
    {{- include "wiz-admission-controller.labels" . | nindent 4 }}
roleRef:
  kind: ClusterRole
  name: {{ printf "%s-event-creator" (include "wiz-admission-controller.manager.serviceAccountName" .) }}
  apiGroup: rbac.authorization.k8s.io
subjects:
  - kind: ServiceAccount
    name: {{ include "wiz-admission-controller.manager.serviceAccountName" . }}
    namespace: {{ .Release.Namespace | quote }}
{{- end }}
{{- end }}
