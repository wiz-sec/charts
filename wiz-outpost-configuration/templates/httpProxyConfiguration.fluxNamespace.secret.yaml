{{- if and .Values.httpProxyConfiguration.enabled .Values.httpProxyConfiguration.createFluxNamespaceCopy }}
{{- $fluxNamespace := include "wiz-outpost-configuration.fluxNamespace" . }}
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: {{ .Values.httpProxyConfiguration.name }}
  namespace: {{ $fluxNamespace }}
  labels:
    {{- include "wiz-outpost-configuration.labels" . | nindent 4 }}
  annotations:
    meta.helm.sh/release-name: "{{ .Release.Name }}"
    meta.helm.sh/release-namespace: "{{ .Release.Namespace }}"
data:
  {{- include "wiz-outpost-configuration.httpProxyConfiguration.data" . | nindent 2 }}
{{- end }}
