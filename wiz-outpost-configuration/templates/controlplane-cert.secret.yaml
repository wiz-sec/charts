{{- if .Values.controlPlaneTLS.enabled }}
{{- $certGeneration := .Values.controlPlaneTLS.certGeneration | default "1" }}

{{- /* CA regeneration logic - only depends on CA's own certGeneration */ -}}
{{- $existingCA := lookup "v1" "Secret" .Release.Namespace .Values.controlPlaneTLS.caSecretName }}
{{- $regenerateCA := true }}
{{- $ca := dict }}

{{- if $existingCA }}
  {{- $existingCertGeneration := index $existingCA.metadata.annotations "wiz.io/cert-generation" | default "" }}
  {{- if eq $existingCertGeneration $certGeneration }}
    {{- $regenerateCA = false }}
    {{- $ca = dict "Cert" (index $existingCA.data "ca.crt" | b64dec) "Key" (index $existingCA.data "ca.key" | b64dec) }}
  {{- end }}
{{- end }}

{{- if $regenerateCA }}
  {{- $ca = genCA "wiz-control-plane-ca" 3650 }}
{{- end }}

{{- /* Compute CA hash for server/client cert regeneration */ -}}
{{- $caHash := $ca.Cert | sha256sum }}

{{- /* Client cert regeneration logic - based on CA hash */ -}}
{{- $existingClient := lookup "v1" "Secret" .Release.Namespace .Values.controlPlaneTLS.clientSecretName }}
{{- $regenerateClient := true }}
{{- $clientCert := dict }}

{{- if $existingClient }}
  {{- $existingCAHash := index $existingClient.metadata.annotations "wiz.io/control-plane-ca-hash" | default "" }}
  {{- if eq $existingCAHash $caHash }}
    {{- $regenerateClient = false }}
    {{- $clientCert = dict "Cert" (index $existingClient.data "tls.crt" | b64dec) "Key" (index $existingClient.data "tls.key" | b64dec) }}
  {{- end }}
{{- end }}

{{- if $regenerateClient }}
  {{- $clientCN := "wiz-control-plane-client" }}
  {{- $clientCert = genSignedCert $clientCN nil nil 3650 $ca }}
{{- end }}
---
# CA Secret - contains both cert and private key (for control plane pods only)
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.controlPlaneTLS.caSecretName }}
  labels:
    {{- include "wiz-outpost-configuration.labels" . | nindent 4 }}
  annotations:
    wiz.io/cert-generation: {{ $certGeneration | quote }}
type: Opaque
data:
  ca.crt: {{ $ca.Cert | b64enc }}
  ca.key: {{ $ca.Key | b64enc }}
---
# CA ConfigMap - contains only the public cert (safe for worker nodes)
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.controlPlaneTLS.caConfigMapName }}
  labels:
    {{- include "wiz-outpost-configuration.labels" . | nindent 4 }}
  annotations:
    wiz.io/cert-generation: {{ $certGeneration | quote }}
data:
  ca.crt: |
{{ $ca.Cert | indent 4 }}
---
# Client certificate - shared by all clients for mTLS
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.controlPlaneTLS.clientSecretName }}
  labels:
    {{- include "wiz-outpost-configuration.labels" . | nindent 4 }}
  annotations:
    wiz.io/control-plane-ca-hash: {{ $caHash | quote }}
type: kubernetes.io/tls
data:
  tls.crt: {{ $clientCert.Cert | b64enc }}
  tls.key: {{ $clientCert.Key | b64enc }}
{{- end }}
