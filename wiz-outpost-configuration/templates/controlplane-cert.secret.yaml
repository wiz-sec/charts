{{/*
CA rotation logic for control plane mTLS.

This template manages the CA Secret, CA ConfigMap (trust bundle), and client
certificate. It supports zero-downtime CA rotation with the following design:

CA naming:
  - prev-ca: the old current-ca after promotion. Kept in the trust bundle until
    the next rotation so that certs signed with it remain verifiable while
    consumer charts regenerate their server certs.
  - current-ca: the trusted CA, always used for signing. Pods trust this CA
    via the ConfigMap trust bundle.
  - next-ca: a pre-generated CA ready for the next rotation. Always present in
    the trust bundle so pods trust it before it becomes current.

Lifecycle:
  1. Fresh install: generate current-ca and next-ca.
  2. Idle reconciliation (certGeneration unchanged): load existing state as-is.
     No cert generation, no promotion. Helm upgrade produces no diff.
  3. Rotation (certGeneration changes):
     a. If next-ca is in the ConfigMap trust bundle (pods trust it): promote
        next→current, current→prev, generate fresh next-ca. Single apply.
     b. If next-ca is NOT in the ConfigMap (previous apply failed): keep
        existing state. Reconciliation retries the ConfigMap each cycle.
        Next rotation reattempts promotion.
     c. No next-ca (upgrade from older version): generate one. Next rotation
        promotes it.

Signing:
  Always uses current-ca, which is the CA pods already trust. There is no
  signing CA selection or ConfigMap staleness check needed — current-ca is
  always the safe choice.

Resource layout:
  CA Secret     — prev-ca.crt/key, current-ca.crt/key, next-ca.crt/key
  CA ConfigMap  — ca.crt (PEM trust bundle: prev + current + next)
  Client cert   — tls.crt/tls.key (signed by current CA)

Helm apply order:
  Within this chart, Helm applies Secrets BEFORE ConfigMaps (kind sort positions
  9 vs 11). Since signing always uses current-ca (which pods already trust from
  the previous ConfigMap), partial apply failures are safe — if the ConfigMap
  fails to apply, current-ca hasn't changed and all certs remain valid.
*/}}
{{- if .Values.controlPlaneTLS.enabled }}
{{- $certGeneration := .Values.controlPlaneTLS.certGeneration | default "1" }}

{{- $existingCA := lookup "v1" "Secret" .Release.Namespace .Values.controlPlaneTLS.caSecretName }}
{{- $currentCA := dict }}
{{- $nextCA := dict }}
{{- $prevCA := dict }}

{{- /* Validate the existing Secret has the expected format (current-ca keys).
       Treat old-format or missing Secrets as fresh install. */ -}}
{{- $validCA := false }}
{{- if $existingCA }}
  {{- if and (hasKey $existingCA.data "current-ca.crt") (hasKey $existingCA.data "current-ca.key") }}
    {{- $validCA = true }}
  {{- end }}
{{- end }}

{{- $effectiveCertGeneration := $certGeneration }}

{{- if $validCA }}
  {{- $existingCertGeneration := index $existingCA.metadata.annotations "wiz.io/cert-generation" | default "" }}

  {{- /* Load existing CAs using buildCustomCert to get proper Certificate structs
         (required by genSignedCert). Secret .data is base64-encoded PEM, which is
         exactly what buildCustomCert expects. */ -}}
  {{- $currentCA = buildCustomCert (index $existingCA.data "current-ca.crt") (index $existingCA.data "current-ca.key") }}

  {{- if and (hasKey $existingCA.data "next-ca.crt") (hasKey $existingCA.data "next-ca.key") }}
    {{- $nextCA = buildCustomCert (index $existingCA.data "next-ca.crt") (index $existingCA.data "next-ca.key") }}
  {{- end }}

  {{- if and (hasKey $existingCA.data "prev-ca.crt") (hasKey $existingCA.data "prev-ca.key") }}
    {{- $prevCA = buildCustomCert (index $existingCA.data "prev-ca.crt") (index $existingCA.data "prev-ca.key") }}
  {{- end }}

  {{- /* Rotation — only acts when certGeneration changes. Idle reconciliation
         loads existing state as-is, producing no Helm diff.
         When next-ca is in the ConfigMap (pods trust it): promote and generate
         a fresh next. Otherwise keep existing state and preserve the existing
         annotation so the next reconciliation retries promotion. */ -}}
  {{- if ne $existingCertGeneration $certGeneration }}
    {{- if $nextCA.Cert }}
      {{- $existingConfigMap := lookup "v1" "ConfigMap" .Release.Namespace .Values.controlPlaneTLS.caConfigMapName }}
      {{- if and $existingConfigMap (contains $nextCA.Cert (index $existingConfigMap.data "ca.crt" | default "")) }}
        {{- $prevCA = $currentCA }}
        {{- $currentCA = $nextCA }}
        {{- $nextCA = genCA "wiz-control-plane-ca" 3650 }}
      {{- else }}
        {{- /* Promotion skipped — ConfigMap doesn't have next-ca yet.
               Keep existing annotation so next reconciliation retries. */ -}}
        {{- $effectiveCertGeneration = $existingCertGeneration }}
      {{- end }}
    {{- else }}
      {{- /* No next-ca (upgrade from older version). Generate one for the next rotation. */ -}}
      {{- $nextCA = genCA "wiz-control-plane-ca" 3650 }}
    {{- end }}
  {{- else }}
    {{- $effectiveCertGeneration = $existingCertGeneration }}
  {{- end }}

{{- else }}
  {{- /* Fresh install or old-format Secret: generate current + next so the
         first rotation can promote next in a single apply. */ -}}
  {{- $currentCA = genCA "wiz-control-plane-ca" 3650 }}
  {{- $nextCA = genCA "wiz-control-plane-ca" 3650 }}
{{- end }}

{{- /* Build CA trust bundle: prev (if any) + current + next (if any). */ -}}
{{- $caTrustBundle := "" }}
{{- $hasPrevCA := and $prevCA $prevCA.Cert }}
{{- $hasNextCA := and $nextCA $nextCA.Cert }}
{{- if $hasPrevCA }}
  {{- $caTrustBundle = $prevCA.Cert }}
{{- end }}
{{- if $caTrustBundle }}
  {{- $caTrustBundle = printf "%s\n%s" $caTrustBundle $currentCA.Cert }}
{{- else }}
  {{- $caTrustBundle = $currentCA.Cert }}
{{- end }}
{{- if $hasNextCA }}
  {{- $caTrustBundle = printf "%s\n%s" $caTrustBundle $nextCA.Cert }}
{{- end }}

{{- /* Client cert — signed with current CA (always trusted) */ -}}
{{- $currentCAHash := $currentCA.Cert | sha256sum }}
{{- $existingClient := lookup "v1" "Secret" .Release.Namespace .Values.controlPlaneTLS.clientSecretName }}
{{- $regenerateClient := true }}
{{- $clientCert := dict }}

{{- if $existingClient }}
  {{- $existingCAHash := index $existingClient.metadata.annotations "wiz.io/control-plane-ca-hash" | default "" }}
  {{- if eq $existingCAHash $currentCAHash }}
    {{- $regenerateClient = false }}
    {{- $clientCert = dict "Cert" (index $existingClient.data "tls.crt" | b64dec) "Key" (index $existingClient.data "tls.key" | b64dec) }}
  {{- end }}
{{- end }}

{{- if $regenerateClient }}
  {{- $clientCN := "wiz-control-plane-client" }}
  {{- $clientCert = genSignedCert $clientCN nil nil 3650 $currentCA }}
{{- end }}
---
# CA Secret — contains prev (post-promotion), current, and next (pre-generated
# for the next rotation) CA cert+key pairs.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.controlPlaneTLS.caSecretName }}
  labels:
    {{- include "wiz-outpost-configuration.labels" . | nindent 4 }}
  annotations:
    wiz.io/cert-generation: {{ $effectiveCertGeneration | quote }}
type: Opaque
data:
{{- if $hasPrevCA }}
  prev-ca.crt: {{ $prevCA.Cert | b64enc }}
  prev-ca.key: {{ $prevCA.Key | b64enc }}
{{- end }}
  current-ca.crt: {{ $currentCA.Cert | b64enc }}
  current-ca.key: {{ $currentCA.Key | b64enc }}
{{- if $hasNextCA }}
  next-ca.crt: {{ $nextCA.Cert | b64enc }}
  next-ca.key: {{ $nextCA.Key | b64enc }}
{{- end }}
---
# CA ConfigMap — trust bundle for TLS verification.
# Contains prev + current + next CAs (whichever exist) for zero-downtime rotation.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.controlPlaneTLS.caConfigMapName }}
  labels:
    {{- include "wiz-outpost-configuration.labels" . | nindent 4 }}
  annotations:
    wiz.io/cert-generation: {{ $effectiveCertGeneration | quote }}
data:
  ca.crt: |
{{ $caTrustBundle | indent 4 }}
  ca-hash: {{ $caTrustBundle | sha256sum | quote }}
---
# Client certificate — signed by current CA for mTLS
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.controlPlaneTLS.clientSecretName }}
  labels:
    {{- include "wiz-outpost-configuration.labels" . | nindent 4 }}
  annotations:
    wiz.io/control-plane-ca-hash: {{ $currentCAHash | quote }}
type: kubernetes.io/tls
data:
  tls.crt: {{ $clientCert.Cert | b64enc }}
  tls.key: {{ $clientCert.Key | b64enc }}
{{- end }}
