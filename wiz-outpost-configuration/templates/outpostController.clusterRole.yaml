{{- if and .Values.outpostController.enabled .Values.outpostController.reducedPermissions }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "wiz-outpost-configuration.fullname" . }}-outpost-controller
  labels:
    {{- include "wiz-outpost-configuration.labels" . | nindent 4 }}
    app.kubernetes.io/component: outpost-controller
rules:
  # Doctor diagnostics - read-only cluster access for node health checks
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  # Namespace operations - required for Helm deployments (CreateNamespace=true in code)
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "create"]
  # Helm release metadata - read-only cluster-wide access required by Helm client
  # Note: Helm stores release metadata in secrets and the controller's Helm client
  # requires cluster-wide read access. Write access to secrets is restricted to
  # the wiz-default and wiz-flux-system namespaces via namespace-scoped Roles.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
{{- end }}
