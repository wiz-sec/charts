# Default values for wiz-outpost-configuration.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Shared values used by multiple components
outpostId: ""
clusterRegion: ""
clusterName: ""
env: ""

# Control plane mTLS configuration
# When enabled, generates CA and client certificate for secure communication between control plane components
# Server certificates are generated by each service's own Helm chart
controlPlaneTLS:
  enabled: false
  required: false
  # certGeneration controls CA certificate regeneration. CA is only regenerated
  # when this value changes. Controlled by FF in provisioner-helm.
  # Server/client certs automatically regenerate when CA changes (via CA hash).
  certGeneration: "1"
  # Secret containing CA cert + private key (for control plane pods to sign server certs)
  caSecretName: wiz-control-plane-ca
  # ConfigMap containing CA cert only (for worker node pods - no private key exposure)
  caConfigMapName: wiz-control-plane-ca
  # Shared client certificate for mTLS authentication
  clientSecretName: wiz-control-plane-client-cert

httpProxyConfiguration:
  enabled: false
  name: wiz-http-proxy-configuration
  # nodeConfigurationType: none # supported values: none, gcp-ubuntu
  # httpProxy: replaceme
  # httpsProxy: replaceme
  # noProxy:
  #   - replaceme
  #   - replaceme2
  # caCertificate: |
  #   ----- BEGIN CERTIFICATE -----
  #   replace me
  #   ----- END CERTIFICATE -----
  # clientCertificate: |
  #   ----- BEGIN CERTIFICATE -----
  #   replace me
  #   ----- END CERTIFICATE -----

agent:
  enabled: false
  clientId: ""
  clientSecret: ""
  privateKey: ""
  # Annotations to add to the agent secret
  annotations: {}

agentCredsSecretName: wiz-outpost-agent-creds

azureWorkerCredentials: 
  # tenantId: replaceme
  # aadClientId: replaceme
  # aadClientSecret: replaceme
  # subscriptionId: replaceme
  # environment: replaceme
  # useInstanceMetadata: false
  # useFederatedToken: false
azureWorkerCredentialsSecretName: azure-creds

serviceAccount:
  # Specifies whether a service account should be created
  create: false
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If empty, a name is generated using the fullname template
  name: ""

networkAnalyzer:
  enabled: false
  name: wiz-network-analyzer
  wizRegion: ""
  dataCenter: ""
  logsIngestionEndpoint: ""
  forceHttp1: false
  skipDnsResolveCheck: true
  image:
    registry: public-registry.wiz.io/wiz-app
    repository: wiz-network-analyzer
    pullPolicy: Always
    # Overrides the image tag whose default is the chart appVersion.
    tag: "0.1"
  failDeploymentOnFailure: true

  podAnnotations: {}
  imagePullSecrets: []
  resources: {}
  rollingUpdate: true
  publicRegistryEndpoints: []
  privateRegistryEndpoints: []

outpostController:
  enabled: false
  serviceAccountName: outpost-controller-sa
  # When true, use a constrained cluster role instead of cluster-admin.
  # This mode is intended only for Git‑proxy (FluxCRsOnly) deployments; the
  # controller will *not* be granted cluster-admin, but it will still be able
  # to do what Helm needs:
  #   * read nodes (health checks)
  #   * create/get/list namespaces (the namespace must already exist when
  #     reducedPermissions is enabled)
  #   * read secrets cluster-wide for Helm release metadata
  #   * manage the Flux CRDs (helmreleases, kustomizations, gitrepositories,
  #     etc.) – the chart installs these on startup.
  # If you need any other cluster-scoped permissions, either leave this set to
  # false or add additional rules to the ClusterRole template above.
  reducedPermissions: false
  # Flux namespace for RBAC (secrets, configmaps, gitrepositories, kustomizations).
  # When set, creates Role and RoleBinding in this namespace.
  # If empty, auto-derives from release namespace prefix (e.g., wiz-default -> wiz-flux-system).
  wizFluxNamespace: wiz-flux-system
  image:
    repository: public-registry.wiz.io
    name: wiz-outpost-controller
    pullPolicy: Always
    # Overrides the image tag whose default is the chart appVersion.
    tag: 32070f0468be52d229d83fe1e47670d091b95630-multiarch
  resources: {}

clusterRegistrar:
  enabled: false
  name: wiz-outpost-cluster-registrar
  image:
    repository: public-registry.wiz.io
    name: wiz-outpost-cluster-registrar
    pullPolicy: Always
    # Overrides the image tag whose default is the chart appVersion.
    tag: 9d5301eac87c37db870395ac1b36f1361285532b-multiarch
  # Single configuration object that gets passed as JSON
  config:
    cloudProvider: ""  # Required: aws, azure, gcp, or oci

    # AWS-specific configuration
    awsConfig:
#      kubernetesServiceAccountName: ""
#      regionalReplicaStateBucketName: ""
#      regionalReplicaImageRepository: ""

    # Azure-specific configuration
    azureConfig:
#      subscriptionId: ""
#      resourceGroupName: ""
#      diskStorageAccountNames: []
#      appServiceStorageAccountNames: []
#      podIdentityName: ""
#      nodeResourceGroup: ""
#      kubernetesServiceAccountName: ""
#      workerManagedIdentityID: ""
#      subnetId: ""

    # GCP-specific configuration
    gcpConfig:
#      projectId: ""
#      clusterZone: ""
#      nodePools:
      # - nodePoolID: ""
      #   minSize: 1
      #   maxSize: 10

    # OCI configuration
    ociConfig:
#      clusterOCID: ""
#      nodePools: []
      # - nodePoolOCID: ""
      #   minSize: 1
      #   maxSize: 10

    # HTTP Proxy configuration (optional)
    #httpProxyConfig:
    #  httpProxy: ""
    #  httpsProxy: ""
    #  vpcCIDRs: []

    # Internet access configuration (optional)
    #internetAccessConfig:
    #  skipSslValidation: false
    #  trustedCA: ""

    # Storage class parameters (optional)
    #storageClassParameters: {}

  failDeploymentOnFailure: true
  resources: {}

podAnnotations: {}
imagePullSecrets: []
podSecurityContext: {}
securityContext: {}
nodeSelector: {}
tolerations: []
affinity: {}
