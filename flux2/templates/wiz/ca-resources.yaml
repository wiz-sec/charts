{{- /* WIZ: Replicate CA ConfigMap from the source namespace into the flux namespace.
       Flux controllers run in flux-system but the CA ConfigMap is created in the
       outpost namespace by wiz-outpost-configuration. This replicates it so volume
       mounts can reference it by name in the pod's namespace. */ -}}
{{- if include "wiz.controlplane-tls-active" . }}
{{- $sourceNs := .Values.controlPlaneTLS.caSourceNamespace | default .Release.Namespace }}
{{- if ne $sourceNs .Release.Namespace }}
{{- $caConfigMap := lookup "v1" "ConfigMap" $sourceNs .Values.controlPlaneTLS.caConfigMapName }}
{{- if $caConfigMap }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.controlPlaneTLS.caConfigMapName }}
  labels:
    {{- include "flux2.labels" . | nindent 4 }}
data:
  ca.crt: |
{{ index $caConfigMap.data "ca.crt" | indent 4 }}
{{- end }}
{{- end }}
{{- end }}
